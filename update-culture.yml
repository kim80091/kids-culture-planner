name: 문화행사 데이터 업데이트

on:
  schedule:
    # 매일 KST 01:00 (UTC 16:00) 자동 실행
    - cron: '0 16 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 (GitHub Actions 탭에서 "Run workflow" 클릭)

jobs:
  update-culture-data:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 문화행사 데이터 수집
        env:
          CULTURE_KEY: ${{ secrets.CULTURE_KEY }}
        run: node scripts/fetch-culture.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/culture-events.json
          git diff --staged --quiet && echo "변경 없음 - 스킵" || (
            git commit -m "data: 문화행사 업데이트 $(date '+%Y-%m-%d')"
            git push
          )
